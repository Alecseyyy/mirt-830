################################################################################
# Mirtek CC1101 Gateway — ESPHome 2026.4.x
# Репозиторий: https://github.com/Alecseyyy/ESPHome-Mirt-830
#
# CC1101 → ESP32:  SCK=18  MOSI=23  MISO=19  CS=5  GDO0=22
# SSD1306 OLED  :  SDA=21  SCL=22  ← если GDO0 тоже 22, смените GDO0 на GPIO4
################################################################################

substitutions:
  device_name:    "mirtek-gw"
  friendly_name:  "Mirtek Gateway"
  meter_address:  "1"    # ← адрес счётчика (с корпуса, 1..65000)
  poll_interval:  "300s"     # ← интервал опроса (минимум 60s)
  mqtt_prefix:    "mirtek"
  display_flip_s: "6"        # секунд на каждой странице OLED

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino
    version: recommended

logger:
  level: INFO
  baud_rate: 115200

# ── Home Assistant API ─────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret ha_api_key
  services:
    - service: poll
      then:
        - lambda: id(mirtek).poll_all();
    - service: relay_on
      then:
        - lambda: id(mirtek).relay_on();
    - service: relay_off
      then:
        - lambda: id(mirtek).relay_off();

# ── OTA ────────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

# ── WiFi ───────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: "mirtek1234"

captive_portal:

# ── Web server ────────────────────────────────────────────────────────────────
web_server:
  port: 80
  version: 3
  include_internal: false
  auth:
    username: admin
    password: !secret web_password

# ── MQTT ───────────────────────────────────────────────────────────────────────
mqtt:
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_pass
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: "${mqtt_prefix}/${meter_address}"
  birth_message:
    topic: "${mqtt_prefix}/${meter_address}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "${mqtt_prefix}/${meter_address}/status"
    payload: "offline"
    retain: true
  on_message:
    - topic: "${mqtt_prefix}/${meter_address}/cmd"
      then:
        - lambda: |-
            int v = atoi(x.c_str());
            if      (v == 1) id(mirtek).poll_all();
            else if (v == 8) id(mirtek).relay_on();
            else if (v == 9) id(mirtek).relay_off();

# ── SPI (CC1101) ───────────────────────────────────────────────────────────────
spi:
  clk_pin:  GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# ── I2C (OLED) — закомментируйте если дисплея нет ────────────────────────────
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

# ── Шрифты OLED ───────────────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 16
  - file: "gfonts://Roboto"
    id: font_small
    size: 9

# ── OLED SSD1306 128×64 — закомментируйте если дисплея нет ──────────────────
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    update_interval: 1s
    lambda: |-
      switch (id(disp_page)) {
        case 0:
          it.printf(0, 0,  id(font_small), "=== ЭНЕРГИЯ ===");
          it.printf(0, 12, id(font_small), "Sum: %.2f kWh", id(s_sum).state);
          it.printf(0, 22, id(font_small), "T1:  %.2f kWh", id(s_t1).state);
          it.printf(0, 32, id(font_small), "T2:  %.2f kWh", id(s_t2).state);
          it.printf(0, 42, id(font_small), "T3:  %.2f kWh", id(s_t3).state);
          it.printf(0, 52, id(font_small), "%s", id(t_tariff).state.c_str());
          break;
        case 1:
          it.printf(0, 0,  id(font_small), "=== U / I ===");
          it.printf(0, 12, id(font_small), "U1:%.0fV I1:%.2fA", id(s_v1).state, id(s_i1).state);
          it.printf(0, 22, id(font_small), "U2:%.0fV I2:%.2fA", id(s_v2).state, id(s_i2).state);
          it.printf(0, 32, id(font_small), "U3:%.0fV I3:%.2fA", id(s_v3).state, id(s_i3).state);
          it.printf(0, 42, id(font_small), "f: %.2f Hz", id(s_freq).state);
          it.printf(0, 52, id(font_small), "cos: %.3f", id(s_cos).state);
          break;
        case 2:
          it.printf(0, 0,  id(font_small), "=== МОЩНОСТЬ ===");
          it.printf(0, 12, id(font_small), "P:  %.3f kW", id(s_kw).state);
          it.printf(0, 22, id(font_small), "Q:  %.3f kvar", id(s_kvar).state);
          it.printf(0, 32, id(font_small), "Pa:%.0f Pb:%.0f Pc:%.0f", id(s_pa).state, id(s_pb).state, id(s_pc).state);
          it.printf(0, 42, id(font_small), "T счётчика: %.0f C", id(s_temp).state);
          it.printf(0, 52, id(font_small), "Батарея: %.0f%%", id(s_bat).state);
          break;
        case 3:
          it.printf(0, 0,  id(font_small), "=== СТАТУС ===");
          it.printf(0, 12, id(font_small), "Реле: %s", id(t_relay).state.c_str());
          it.printf(0, 22, id(font_small), "Пломбы: %s", id(t_seal).state.c_str());
          it.printf(0, 32, id(font_small), "FW: %s", id(t_fw).state.c_str());
          it.printf(0, 42, id(font_small), "%s", id(t_date).state.c_str());
          it.printf(0, 52, id(font_small), "%s", id(t_status).state.c_str());
          break;
      }

# ── Переменная страницы дисплея ───────────────────────────────────────────────
globals:
  - id: disp_page
    type: int
    restore_value: no
    initial_value: "0"

interval:
  - interval: ${display_flip_s}s
    then:
      - lambda: id(disp_page) = (id(disp_page) + 1) % 4;

# ── External component — загружается из GitHub ────────────────────────────────
external_components:
  - source:
      type: git
      url: https://github.com/Alecseyyy/ESPHome-Mirt-830
      ref: main
    components: [mirtek_cc1101]

# ── Компонент Миртек ──────────────────────────────────────────────────────────
mirtek_cc1101:
  id: mirtek
  cs_pin: GPIO5
  gdo0_pin: GPIO22
  meter_address: ${meter_address}
  update_interval: ${poll_interval}

  # Активная энергия (кВт·ч)
  energy_sum:
    name: "Суммарное потребление"
    id: s_sum
  energy_t1:
    name: "Тариф 1 (день)"
    id: s_t1
  energy_t2:
    name: "Тариф 2 (ночь)"
    id: s_t2
  energy_t3:
    name: "Тариф 3 (полупик)"
    id: s_t3

  # Реактивная энергия (кВАр·ч)
  reactive_sum:
    name: "Реактивная суммарная"
    id: s_sum_r
  reactive_t1:
    name: "Реактивная Т1"
    id: s_t1_r
  reactive_t2:
    name: "Реактивная Т2"
    id: s_t2_r
  reactive_t3:
    name: "Реактивная Т3"
    id: s_t3_r

  # Мгновенные суммарные
  power_active:
    name: "Активная мощность"
    id: s_kw
  power_reactive:
    name: "Реактивная мощность"
    id: s_kvar
  frequency:
    name: "Частота сети"
    id: s_freq
  power_factor:
    name: "Косинус фи"
    id: s_cos

  # Напряжение по фазам (В)
  voltage_1:
    name: "Напряжение фаза 1"
    id: s_v1
  voltage_2:
    name: "Напряжение фаза 2"
    id: s_v2
  voltage_3:
    name: "Напряжение фаза 3"
    id: s_v3

  # Ток по фазам (А)
  current_1:
    name: "Ток фаза 1"
    id: s_i1
  current_2:
    name: "Ток фаза 2"
    id: s_i2
  current_3:
    name: "Ток фаза 3"
    id: s_i3

  # Активная мощность по фазам (Вт)
  power_a:
    name: "Активная мощность фаза 1"
    id: s_pa
  power_b:
    name: "Активная мощность фаза 2"
    id: s_pb
  power_c:
    name: "Активная мощность фаза 3"
    id: s_pc

  # Реактивная мощность по фазам (кВАр)
  reactive_a:
    name: "Реактивная мощность фаза 1"
    id: s_qa
  reactive_b:
    name: "Реактивная мощность фаза 2"
    id: s_qb
  reactive_c:
    name: "Реактивная мощность фаза 3"
    id: s_qc

  # Полная мощность по фазам (ВА)
  apparent_a:
    name: "Полная мощность фаза 1"
    id: s_sa
  apparent_b:
    name: "Полная мощность фаза 2"
    id: s_sb
  apparent_c:
    name: "Полная мощность фаза 3"
    id: s_sc

  # Косинус по фазам
  pf_a:
    name: "Косинус фи фаза 1"
    id: s_ca
  pf_b:
    name: "Косинус фи фаза 2"
    id: s_cb
  pf_c:
    name: "Косинус фи фаза 3"
    id: s_cc

  # Прочие датчики
  temperature:
    name: "Температура счётчика"
    id: s_temp
  battery:
    name: "Ресурс батарейки"
    id: s_bat

  # Текстовые датчики
  tariff:
    name: "Действующий тариф"
    id: t_tariff
  relay_state:
    name: "Состояние реле"
    id: t_relay
  seal_state:
    name: "Состояние пломб"
    id: t_seal
  meter_type:
    name: "Тип счётчика"
    id: t_type
  fw_version:
    name: "Версия прошивки счётчика"
    id: t_fw
  meter_date:
    name: "Дата на счётчике"
    id: t_date
  meter_time:
    name: "Время на счётчике"
    id: t_time
  uptime_meter:
    name: "Время работы счётчика"
    id: t_work
  last_sync:
    name: "Последняя синхронизация"
    id: t_sync
  serial_number:
    name: "Заводской номер"
    id: t_serial
  subscriber:
    name: "Абонент"
    id: t_abon
  status:
    name: "Статус шлюза"
    id: t_status

  # Бинарные датчики
  three_phase:
    name: "3-фазный счётчик"
    id: b_3phase
  relay_on:
    name: "Реле включено"
    id: b_relay
  seal_ok:
    name: "Пломбы в норме"
    id: b_seal_ok
  cc1101_ok:
    name: "CC1101 подключён"
    id: b_cc1101

# ── Кнопки управления ─────────────────────────────────────────────────────────
button:
  - platform: template
    name: "Опросить счётчик"
    icon: mdi:refresh
    on_press:
      - lambda: id(mirtek).poll_all();

  - platform: template
    name: "Включить реле"
    icon: mdi:power-plug
    on_press:
      - lambda: id(mirtek).relay_on();

  - platform: template
    name: "Выключить реле"
    icon: mdi:power-plug-off
    on_press:
      - lambda: id(mirtek).relay_off();

  - platform: template
    name: "Следующая страница дисплея"
    icon: mdi:monitor-arrow-right
    on_press:
      - lambda: id(disp_page) = (id(disp_page) + 1) % 4;

  - platform: restart
    name: "Перезагрузить шлюз"

# ── Диагностика ───────────────────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "WiFi уровень сигнала"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Аптайм шлюза"
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP адрес"
      entity_category: diagnostic
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC адрес"
      entity_category: diagnostic
  - platform: version
    name: "ESPHome версия"
    entity_category: diagnostic

# ── Статус LED ────────────────────────────────────────────────────────────────
status_led:
  pin:
    number: GPIO2
    inverted: false

# ── NTP ───────────────────────────────────────────────────────────────────────
time:
  - platform: sntp
    timezone: "Europe/Moscow"
    servers:
      - pool.ntp.org
      - time.google.com
