# =============================================================================
# Mirtek CC1101 Gateway — ESPHome 2026.4.x
# Поддержка: ESP32, CC1101 433МГц, счётчики Миртек STAR 104/304
# GitHub: https://github.com/YOUR_USERNAME/mirtek-esphome
# =============================================================================

substitutions:
  device_name: "mirtek-gw"
  friendly_name: "Mirtek Gateway"
  meter_address: "1"           # <-- Замените на адрес вашего счётчика (1..65000)
  # SPI пины ESP32 (VSPI по умолчанию)
  spi_clk:  GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  cc1101_cs:   GPIO5            # CS/SS для CC1101
  cc1101_gdo0: GPIO4            # GDO0 от CC1101 (НЕ GPIO22, если используется дисплей!)
  # I2C для OLED дисплея
  i2c_sda: GPIO21
  i2c_scl: GPIO22
  # Статус LED
  status_led_pin: GPIO2

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino
    version: recommended

# =============================================================================
# Логирование
# =============================================================================
logger:
  level: INFO
  baud_rate: 115200

# =============================================================================
# Home Assistant API
# =============================================================================
api:
  encryption:
    key: !secret ha_api_key

# =============================================================================
# OTA
# =============================================================================
ota:
  - platform: esphome
    password: !secret ota_password

# =============================================================================
# WiFi
# =============================================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} AP"
    password: !secret ap_password

captive_portal:

# =============================================================================
# Встроенный веб-сервер
# =============================================================================
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_password

# =============================================================================
# MQTT
# =============================================================================
mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: "mirtek_gw_${meter_address}"
  topic_prefix: "mirtek/${meter_address}"
  birth_message:
    topic: "mirtek/${meter_address}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "mirtek/${meter_address}/status"
    payload: "offline"
    retain: true

# =============================================================================
# SPI шина для CC1101
# =============================================================================
spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

# =============================================================================
# I2C шина для OLED
# =============================================================================
i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  scan: true
  id: i2c_bus

# =============================================================================
# Кастомный компонент Mirtek CC1101 — загружается из GitHub
# =============================================================================
external_components:
  - source:
      type: git
      url: https://github.com/YOUR_USERNAME/mirtek-esphome
      ref: main
    components: [mirtek_cc1101]

mirtek_cc1101:
  id: mirtek_meter
  cs_pin:
    number: ${cc1101_cs}
    mode:
      output: true
  gdo0_pin:
    number: ${cc1101_gdo0}
    mode:
      input: true
  meter_address: ${meter_address}
  update_interval: 300s

  # --- Счётчики энергии (кВт·ч) ---
  energy_sum:
    name: "Электроэнергия Σ"
    id: energy_sum

  energy_t1:
    name: "Электроэнергия Т1 (день)"
    id: energy_t1

  energy_t2:
    name: "Электроэнергия Т2 (ночь)"
    id: energy_t2

  energy_t3:
    name: "Электроэнергия Т3 (полупик)"
    id: energy_t3

  # --- Напряжение (В) ---
  voltage_a:
    name: "Напряжение фаза A"
    id: voltage_a

  voltage_b:
    name: "Напряжение фаза B"
    id: voltage_b

  voltage_c:
    name: "Напряжение фаза C"
    id: voltage_c

  # --- Ток (А) ---
  current_a:
    name: "Ток фаза A"
    id: current_a

  current_b:
    name: "Ток фаза B"
    id: current_b

  current_c:
    name: "Ток фаза C"
    id: current_c

  # --- Мощность суммарная ---
  power_active:
    name: "Активная мощность Σ"
    id: power_active

  power_reactive:
    name: "Реактивная мощность Σ"
    id: power_reactive

  frequency:
    name: "Частота сети"
    id: frequency

  power_factor:
    name: "Cos φ Σ"
    id: power_factor

  temperature:
    name: "Температура счётчика"
    id: meter_temp

  # --- Мощность по фазам (Вт) ---
  power_a:
    name: "Активная мощность фаза A"
    id: power_a

  power_b:
    name: "Активная мощность фаза B"
    id: power_b

  power_c:
    name: "Активная мощность фаза C"
    id: power_c

  reactive_a:
    name: "Реактивная мощность фаза A"
    id: reactive_a

  reactive_b:
    name: "Реактивная мощность фаза B"
    id: reactive_b

  reactive_c:
    name: "Реактивная мощность фаза C"
    id: reactive_c

  apparent_a:
    name: "Полная мощность фаза A"
    id: apparent_a

  apparent_b:
    name: "Полная мощность фаза B"
    id: apparent_b

  apparent_c:
    name: "Полная мощность фаза C"
    id: apparent_c

  pf_a:
    name: "Cos φ фаза A"
    id: pf_a

  pf_b:
    name: "Cos φ фаза B"
    id: pf_b

  pf_c:
    name: "Cos φ фаза C"
    id: pf_c

  # --- Текстовые датчики ---
  tariff:
    name: "Текущий тариф"
    id: tariff_now

  relay_state:
    name: "Состояние реле"
    id: relay_state_ts

  seal_state:
    name: "Состояние пломб"
    id: seal_state_ts

  hw_version:
    name: "Версия платы HW"
    id: hw_ver

  sw_version:
    name: "Версия ПО SW"
    id: sw_ver

  meter_type:
    name: "Тип счётчика"
    id: meter_type_ts

  meter_datetime:
    name: "Время счётчика"
    id: meter_datetime_ts

  last_status:
    name: "Статус опроса"
    id: last_status_ts

  # --- Бинарные датчики ---
  seal_cover:
    name: "Вскрытие корпуса"
    id: seal_cover_bs

  seal_terminal:
    name: "Вскрытие клеммной крышки"
    id: seal_terminal_bs

  seal_module:
    name: "Вскрытие модуля связи"
    id: seal_module_bs

  magnet_dc:
    name: "Постоянный магнит"
    id: magnet_dc_bs

  magnet_ac:
    name: "Переменный магнит"
    id: magnet_ac_bs

  relay_on:
    name: "Реле включено"
    id: relay_on_bs

  current_imbalance:
    name: "Небаланс токов"
    id: current_imbalance_bs

  time_synced:
    name: "Синхронизация времени"
    id: time_synced_bs

# =============================================================================
# OLED Дисплей SSD1306 128x64 (I2C, 0x3C)
# Если дисплея нет — закомментируйте блоки font, globals, interval, display
# =============================================================================
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 11

globals:
  - id: display_page
    type: int
    restore_value: no
    initial_value: "0"

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(display_page) = (id(display_page) + 1) % 4;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    update_interval: 1s
    lambda: |-
      switch (id(display_page)) {
        case 0:
          it.printf(0,  0, id(font_small), "=== ЭНЕРГИЯ ===");
          it.printf(0, 13, id(font_small), "Sum: %.2f kWh", id(energy_sum).state);
          it.printf(0, 26, id(font_small), "T1:  %.2f kWh", id(energy_t1).state);
          it.printf(0, 39, id(font_small), "T2:  %.2f kWh", id(energy_t2).state);
          it.printf(0, 52, id(font_small), "T3:  %.2f kWh", id(energy_t3).state);
          break;
        case 1:
          it.printf(0,  0, id(font_small), "=== U / I ===");
          it.printf(0, 13, id(font_small), "Ua:%.1fV Ia:%.2fA", id(voltage_a).state, id(current_a).state);
          it.printf(0, 26, id(font_small), "Ub:%.1fV Ib:%.2fA", id(voltage_b).state, id(current_b).state);
          it.printf(0, 39, id(font_small), "Uc:%.1fV Ic:%.2fA", id(voltage_c).state, id(current_c).state);
          it.printf(0, 52, id(font_small), "f: %.2f Hz", id(frequency).state);
          break;
        case 2:
          it.printf(0,  0, id(font_small), "=== МОЩНОСТЬ ===");
          it.printf(0, 13, id(font_small), "P:  %.0f W", id(power_active).state);
          it.printf(0, 26, id(font_small), "Q:  %.3f kVAr", id(power_reactive).state);
          it.printf(0, 39, id(font_small), "cos:%.2f T:%.1fC", id(power_factor).state, id(meter_temp).state);
          it.printf(0, 52, id(font_small), "%s", id(tariff_now).state.c_str());
          break;
        case 3:
          it.printf(0,  0, id(font_small), "=== СТАТУС ===");
          it.printf(0, 13, id(font_small), "Реле: %s", id(relay_state_ts).state.c_str());
          it.printf(0, 26, id(font_small), "HW:%s SW:%s", id(hw_ver).state.c_str(), id(sw_ver).state.c_str());
          it.printf(0, 39, id(font_small), "%s", id(seal_state_ts).state.c_str());
          it.printf(0, 52, id(font_small), "%s", id(last_status_ts).state.c_str());
          break;
      }

# =============================================================================
# Статус LED
# =============================================================================
status_led:
  pin:
    number: ${status_led_pin}
    inverted: false

# =============================================================================
# Кнопки управления
# =============================================================================
button:
  - platform: restart
    name: "Перезагрузка"

# =============================================================================
# NTP время
# =============================================================================
time:
  - platform: sntp
    id: ntp_time
    timezone: "Europe/Moscow"
    servers:
      - "pool.ntp.org"
      - "time.google.com"

# =============================================================================
# Диагностика
# =============================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP адрес"
      entity_category: diagnostic
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC адрес"
      entity_category: diagnostic

  - platform: version
    name: "ESPHome версия"
    entity_category: diagnostic
